<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Wi-Fi Nhất Tín Logistics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --brand-red: #d91500;
      --text-black: #000000;
      --text-white: #ffffff;
      --card-radius: 30px;
      --button-radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('./assets/background.png');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('./assets/bg-overlay.png');
      background-size: cover;
      background-position: center;
      opacity: 0.32;
      mix-blend-mode: normal;
      pointer-events: none;
    }

    .portal-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      gap: 24px;
      padding: 24px 16px;
    }

    .logo-container {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: slideDown 0.6s ease-out;
    }

    .illustration-img {
      width: 280px;
      height: auto;
      object-fit: contain;
      animation: scaleUp 0.8s ease-out 0.2s both;
    }

    .portal-card {
      background: white;
      width: 100%;
      border-radius: var(--card-radius);
      padding: 32px 24px 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      animation: slideUp 0.6s ease-out 0.4s both;
      gap: 12px;
    }

    .success-icon {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #16a34a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .success-icon svg {
      width: 32px; height: 32px; stroke: white; stroke-width: 2.5; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .portal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-black);
    }

    .portal-subtitle {
      font-size: 13px;
      font-weight: 400;
      color: #555;
      line-height: 1.6;
      padding: 0 8px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #f0f0f0;
      margin: 4px 0;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
    }

    .info-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #fff5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-icon svg {
      width: 18px; height: 18px; stroke: var(--brand-red); stroke-width: 2; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .info-text {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 11px;
      color: #999;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 14px;
      color: #111;
      font-weight: 600;
    }

    .visit-button {
      width: 100%;
      background: var(--brand-red);
      color: white;
      border: none;
      padding: 18px;
      border-radius: var(--button-radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .visit-button:active { opacity: 0.8; }

    .hotline-footer {
      color: white;
      font-size: 14px;
      font-weight: 400;
      margin-top: 4px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease-out 0.8s both;
    }

    @media (max-height: 700px) {
      .illustration-img { width: 180px; }
      .portal-wrapper { gap: 12px; }
    }

    /* Animations */
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  </style>
</head>
<body>

  <div class="portal-wrapper">
    <header class="logo-container">
      <img src="./assets/logo-official.svg" alt="Nhất Tín Logistics Logo" style="height: 38px; width: auto;" />
    </header>

    <img src="./assets/illustration.png" alt="Logistics Illustration" class="illustration-img" />

    <div class="portal-card">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1 class="portal-title">Kết nối thành công!</h1>
      <p class="portal-subtitle">Chào mừng bạn đến với Wi-Fi Nhất Tín Logistics. Chúc bạn có trải nghiệm kết nối tuyệt vời.</p>

      <div class="divider"></div>

      <div class="info-row">
        <div class="info-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"></path>
          </svg>
        </div>
        <div class="info-text">
          <span class="info-label">Hotline hỗ trợ</span>
          <span class="info-value">1900 63 6688</span>
        </div>
      </div>

      <div class="info-row">
        <div class="info-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </div>
        <div class="info-text">
          <span class="info-label">Thời hạn kết nối</span>
          <span class="info-value">8 tiếng / phiên</span>
        </div>
      </div>

      <a href="https://ntlogistics.vn" class="visit-button">
        Khám phá Nhất Tín Logistics →
      </a>
    </div>

    <div class="hotline-footer">Nhất Tín Logistics — Vận chuyển tin cậy</div>
  </div>

</body>
</html>
