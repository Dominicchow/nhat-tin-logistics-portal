<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Wi-Fi Nhất Tín Logistics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --brand-red: #d91500;
      --card-radius: 30px;
      --button-radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('./assets/background.png');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('./assets/bg-overlay.png');
      background-size: cover;
      background-position: center;
      opacity: 0.32;
      pointer-events: none;
    }

    .portal-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      gap: 24px;
      padding: 24px 16px;
    }

    .logo-container {
      animation: slideDown 0.6s ease-out;
    }

    .illustration-img {
      width: 280px;
      height: auto;
      animation: scaleUp 0.8s ease-out 0.2s both;
    }

    .portal-card {
      background: white;
      width: 100%;
      border-radius: var(--card-radius);
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      animation: slideUp 0.6s ease-out 0.4s both;
      gap: 16px;
    }

    .wifi-icon {
      background: var(--brand-red);
      width: 62px; height: 62px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .wifi-icon svg {
      width: 32px; height: 32px; stroke: white; stroke-width: 2.5;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    .portal-title {
      font-size: 20px; font-weight: 700; color: #000;
    }

    .portal-subtitle {
      font-size: 13px; font-weight: 400;
      color: #555; line-height: 1.6; padding: 0 8px;
    }

    .connect-button {
      width: 100%;
      background: var(--brand-red);
      color: white;
      border: none;
      padding: 20px;
      border-radius: var(--button-radius);
      font-size: 16px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .connect-button:active { opacity: 0.8; transform: scale(0.98); }
    .connect-button:disabled { opacity: 0.65; cursor: default; }

    .hotline-footer {
      color: white; font-size: 14px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease-out 0.8s both;
    }

    @media (max-height: 700px) {
      .illustration-img { width: 180px; }
      .portal-wrapper { gap: 12px; }
    }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleUp   { from { opacity: 0; transform: scale(0.9); }       to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn    { from { opacity: 0; }                               to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="portal-wrapper">

    <header class="logo-container">
      <img src="./assets/logo-official.svg" alt="Nhất Tín Logistics" style="height:38px;width:auto;" />
    </header>

    <img src="./assets/illustration.png" alt="Illustration" class="illustration-img" />

    <div class="portal-card">
      <div class="wifi-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
          <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>

      <h1 class="portal-title">Truy cập Mạng Wi-Fi</h1>
      <p class="portal-subtitle">Chào mừng bạn đến với Wi-Fi Nhất Tín Logistics.<br>Bấm nút bên dưới để kết nối.</p>

      <button id="btn-connect" class="connect-button" onclick="doConnect()">
        Truy cập Wifi
      </button>
    </div>

    <div class="hotline-footer">Hotline: 1900 63 6688</div>
  </div>

  <script>
    function doConnect() {
      var btn = document.getElementById('btn-connect');
      btn.textContent = '⏳ Đang kết nối...';
      btn.disabled = true;

      // Chuyển trang accept.html qua HTTP để Aruba đọc được magic string
      // QUAN TRỌNG: phải dùng http:// (không phải https://)
      // Surge.sh hỗ trợ HTTP không cần redirect → Aruba đọc được response body
      setTimeout(function() {
        var params = window.location.search;
        window.location.href = 'http://nhat-tin-portal.surge.sh/accept.html' + params;
      }, 400);
    }
  </script>
</body>
</html>
