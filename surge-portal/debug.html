<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Debug - Aruba Params</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #0f0; font-size: 13px; }
    h2 { color: #fff; margin-bottom: 16px; }
    .param { background: #222; padding: 10px; margin: 6px 0; border-radius: 6px; word-break: break-all; }
    .key { color: #ff0; }
    .val { color: #0ff; }
    .empty { color: #888; }
    textarea { width: 100%; height: 120px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>🔍 Aruba Redirect Params Debug</h2>
  <div id="params"></div>
  <textarea id="raw-url" readonly></textarea>

  <script>
    var container = document.getElementById('params');
    var rawUrlEl = document.getElementById('raw-url');
    var urlParams = new URLSearchParams(window.location.search);

    rawUrlEl.value = window.location.href;

    if ([...urlParams].length === 0) {
      container.innerHTML = '<div class="empty">⚠️ Không có tham số nào trong URL. Aruba chưa redirect tới trang này đúng cách.</div>';
    } else {
      urlParams.forEach(function(value, key) {
        container.innerHTML += '<div class="param"><span class="key">' + key + '</span> = <span class="val">' + value + '</span></div>';
      });
    }
  </script>
</body>
</html>
