<!DOCTYPE html>
<!-- Aruba.InstantOn.Acknowledge -->
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Kết nối thành công - Nhất Tín Logistics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --brand-red: #d91500;
      --card-radius: 30px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('./assets/background.png');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('./assets/bg-overlay.png');
      background-size: cover;
      background-position: center;
      opacity: 0.32;
      pointer-events: none;
    }

    .portal-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      gap: 24px;
      padding: 24px 16px;
    }

    .logo-container {
      animation: slideDown 0.5s ease-out;
    }

    .illustration-img {
      width: 280px; height: auto;
      animation: scaleUp 0.7s ease-out 0.1s both;
    }

    .portal-card {
      background: white;
      width: 100%;
      border-radius: var(--card-radius);
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      animation: slideUp 0.5s ease-out 0.2s both;
      gap: 14px;
    }

    .success-icon {
      width: 62px; height: 62px;
      border-radius: 50%;
      background: #16a34a;
      display: flex; align-items: center; justify-content: center;
    }

    .success-icon svg {
      width: 32px; height: 32px; stroke: white; stroke-width: 2.5;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    .portal-title { font-size: 20px; font-weight: 700; color: #000; }

    .portal-subtitle {
      font-size: 13px; color: #555; line-height: 1.6; padding: 0 8px;
    }

    .progress-box {
      width: 100%;
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 4px;
    }

    .progress-label { font-size: 12px; color: #888; text-align: center; }
    .progress-label span { font-weight: 700; color: var(--brand-red); }

    .progress-track {
      width: 100%; height: 6px;
      background: #f0f0f0; border-radius: 99px; overflow: hidden;
    }

    .progress-bar {
      height: 100%; width: 0%;
      background: var(--brand-red); border-radius: 99px;
    }

    .hotline-footer {
      color: white; font-size: 14px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      animation: fadeIn 0.6s ease-out 0.3s both;
    }

    @media (max-height: 700px) {
      .illustration-img { width: 180px; }
      .portal-wrapper { gap: 12px; }
    }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleUp   { from { opacity: 0; transform: scale(0.9); }       to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn    { from { opacity: 0; }                               to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="portal-wrapper">

    <header class="logo-container">
      <img src="./assets/logo-official.svg" alt="Nhất Tín Logistics" style="height:38px;width:auto;" />
    </header>

    <img src="./assets/illustration.png" alt="Illustration" class="illustration-img" />

    <div class="portal-card">
      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1 class="portal-title">Kết nối thành công!</h1>
      <p class="portal-subtitle">Chào mừng bạn đến với Wi-Fi Nhất Tín Logistics.<br>Chúc bạn có trải nghiệm kết nối tuyệt vời.</p>

      <div class="progress-box">
        <div class="progress-label">Tự động chuyển trang sau <span id="countdown">7</span> giây...</div>
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </div>

    <div class="hotline-footer">Hotline: 1900 63 6688</div>
  </div>

  <script>
    var DURATION = 7;
    var remaining = DURATION;
    var bar = document.getElementById('progress-bar');
    var countEl = document.getElementById('countdown');

    // Khởi động progress bar
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        bar.style.transition = 'width ' + DURATION + 's linear';
        bar.style.width = '100%';
      });
    });

    // Đếm ngược và redirect về ntlogistics.vn
    var timer = setInterval(function() {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(timer);
        window.location.href = 'https://ntlogistics.vn';
      } else {
        countEl.textContent = remaining;
      }
    }, 1000);
  </script>
</body>
</html>
